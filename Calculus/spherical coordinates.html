<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #191919; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="module">
    import { Dot3D, YELLOW, makeDraggable, Text, ThreeDAxes, Axes, ThreeDScene, UP, DOWN, OUT, Line3D, Angle, WHITE, DashedLine, PolarPlane, Sphere} from 'https://esm.sh/manim-web@0.3.21';

    function addVectors(a,b){
        return a.map((e,i) => e + b[i]);
    }

    function scalarMult(a,b){
        return a.map((e,i) => e * b);
    }


    const scene = new ThreeDScene(document.getElementById('container'), {
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#191919',
      phi: 75 * (Math.PI / 180),
      theta: -45 * (Math.PI / 180),
      distance: 20,
      fov: 30,
      enableOrbitControls: true,
      orbitControlsUp: 'z'
    });

    const axes = new ThreeDAxes({
      xRange: [-5, 5, 1],
      yRange: [-5, 5, 1],
      zRange: [-5, 5, 1],
      xLength: 10,
      yLength: 10,
      zLength: 10,
      showTicks: false,
    });

    const plane = new PolarPlane({radius: 5, size: 10, radialDivisions:5, includeAngleLabels: true});
    const plane2 = new PolarPlane({radius: 5, size: 10, radialDivisions:5, includeAngleLabels: true});
    //plane.rotation.x = Math.PI / 2;
    //plane2.rotation.z = Math.PI / 2;
  
    const dot = new Dot3D({ radius: 0.1, color: YELLOW }).moveTo(axes.coordsToPoint(1,1,1)).addUpdater(() => {});
    makeDraggable(dot, scene,);

    const radius = new Line3D({start: [0,0,0], end: dot.getCenter(), lineWidth: 40}).addUpdater((mob) => {
      mob.setEnd(dot.getCenter());
    });

    const radiusProj = new Line3D({start: [0,0,0], end: axes.coordsToPoint(0,0,1), opacity:.15}).addUpdater((mob) => {
      mob.setEnd([dot.getCenter()[0], dot.getCenter()[1], 0]);
    });

    const radiusDown = new Line3D({start: [0,0,0], end: axes.coordsToPoint(0,0,1), opacity:.15}).addUpdater((mob) => {
      mob.setStart(radius.getEnd());
    mob.setEnd(radiusProj.getEnd());
    });
      
    
    const thetaArc = new Angle({ points: [axes.coordsToPoint(1,0,0), axes.coordsToPoint(0,0,0), dot.getCenter()] }, { radius: 0.5 }).addUpdater((mob) => {
      const newAngle = new Angle({ points: [axes.coordsToPoint(1,0,0), axes.coordsToPoint(0,0,0), radiusProj.getEnd()] }, { radius:1 });//radiusProj.getLength() });
      mob.become(newAngle);
    });
        
    const phiArc = new Angle({ points: [axes.coordsToPoint(0,0,1), axes.coordsToPoint(0,0,0), dot.getCenter()] }, { radius: 0.5 }).addUpdater((mob) => {
      const newAngle = new Angle({ points: [axes.coordsToPoint(0,0,1), axes.coordsToPoint(0,0,0), radius.getEnd()] }, { radius: 1 });//radius.getLength() });
      mob.become(newAngle);
    });
    
    const theta = new Text({ text: 'θ', color: WHITE, fontSize: 22}).addUpdater((mob) => {
      const newAngle = new Angle({ points: [axes.coordsToPoint(1,0,0), axes.coordsToPoint(0,0,0), radiusProj.getEnd()] }, { radius: 1});//radiusProj.getLength() });
     mob.moveTo(scalarMult(newAngle.getArcMidpoint(), 1.25));
    });

    const phi = new Text({ text: '𝜙', color: WHITE, fontSize: 22}).addUpdater((mob) => {
      const newAngle = new Angle({ points: [axes.coordsToPoint(0,0,1), axes.coordsToPoint(0,0,0), radius.getEnd()] }, { radius: 1 });//radius.getLength() });
      mob.moveTo(scalarMult(newAngle.getArcMidpoint(), 1.25));
    });

    const r = new Text({ text: 'r', color: WHITE, fontSize: 22}).addUpdater((mob) => {
      mob.moveTo(addVectors(radius.getMidpoint(), scalarMult(OUT, -.2)));
    });
    
    const s1 = new Sphere({radius: 1, color: WHITE, opacity: .05});
    const s2 = new Sphere({radius: 2, color: WHITE, opacity: .05});
    const s3 = new Sphere({radius: 3, color: WHITE, opacity: .05});
    const s4 = new Sphere({radius: 4, color: WHITE, opacity: .05});
    const s5 = new Sphere({radius: 5, color: WHITE, opacity: .05});
        
    scene.add(axes,  plane2, dot, radius,r ,radiusProj,radiusDown, thetaArc, theta, phiArc, phi, s1, s2, s3, s4, s5,);
    scene.addFixedOrientationMobjects(theta, phi, r);
    await scene.wait(Infinity);
  </script>
</body>
</html>
